<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot Pro | Advanced Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; scroll-behavior: smooth; }
        .glow { position: absolute; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-view { display: none !important; }
        .prose { font-size: 0.95rem; line-height: 1.7; color: #cbd5e1; }
        .prose strong { color: #fff; font-weight: 700; }
        .prose ul { list-style-type: none; padding-left: 0; margin: 1rem 0; }
        .prose li { position: relative; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .prose li::before { content: "→"; position: absolute; left: 0; color: var(--brand-cyan); font-weight: bold; }
        .scanning-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent); animation: scan 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(300%); } }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); }
        .chat-bubble-user { background: #0891b2; color: white; }
    </style>
</head>
<body class="selection:bg-cyan-500/30">

    <div id="landing-view">
        <div class="glow top-[-20%] right-[-10%]"></div>
        <nav class="flex items-center justify-between px-6 md:px-16 py-6 sticky top-0 z-50 bg-[#020617]/80 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/20">
                    <i data-lucide="stethoscope" class="w-6 h-6 text-cyan-400"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter italic text-white">MedBot<span class="text-cyan-500">.</span></span>
            </div>
            <button onclick="startApp()" class="px-7 py-3 bg-white text-slate-950 text-xs font-bold rounded-full hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:-translate-y-0.5 transition-all">ENTER DASHBOARD</button>
        </nav>

        <section class="max-w-7xl mx-auto px-6 pt-32 pb-24 text-center">
            <h1 class="text-6xl md:text-[8rem] font-extrabold tracking-tighter mb-10 text-gradient leading-[0.85] py-2">Future-ready<br>clinical care.</h1>
            <p class="text-lg md:text-2xl text-slate-400 max-w-3xl mx-auto mb-16 leading-relaxed font-light">Powered by Gemini Flash for high-precision health insights and instant clinical imagery interpretation.</p>
            <button onclick="startApp()" class="px-14 py-6 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-2xl transition-all shadow-lg flex items-center justify-center gap-3 mx-auto text-lg">
                Start Consultation <i data-lucide="arrow-right"></i>
            </button>
        </section>
    </div>

    <div id="app-view" class="hidden-view flex h-screen bg-[#020617] overflow-hidden">
        <aside class="w-80 bg-[#070b14] border-r border-white/5 flex flex-col z-30">
            <div class="p-8 flex-1 overflow-y-auto space-y-10">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <i data-lucide="stethoscope" class="text-cyan-400 w-7 h-7"></i>
                    <h1 class="text-2xl font-black text-white italic tracking-tighter">MedBot</h1>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-[0.3em] text-cyan-500/60 mb-4 block">Clinical Baseline</label>
                    <textarea id="medical-history" placeholder="Allergies, chronic conditions..." class="w-full h-44 bg-white/5 border border-white/5 rounded-2xl p-5 text-xs text-white resize-none focus:outline-none focus:border-cyan-500/50 transition-all"></textarea>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-[#020617]/80 backdrop-blur-2xl">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-cyan-500"></div>
                    <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Protocol Active</span>
                </div>
                <span class="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded text-[8px] text-cyan-400 font-bold uppercase tracking-widest">Gemini Flash Latest</span>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-12"></div>

            <div class="p-8 md:p-12">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden absolute bottom-full mb-8 left-0">
                        <div class="relative group">
                            <div class="absolute inset-0 scanning-line z-10"></div>
                            <img id="image-preview" src="" class="w-48 h-48 object-cover rounded-[2rem] border-2 border-cyan-500 brightness-75">
                        </div>
                    </div>
                    <form id="chat-form" class="glass rounded-[2.5rem] p-4 flex items-end gap-3 shadow-2xl">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="p-5 text-slate-500 hover:text-cyan-400"><i data-lucide="camera"></i></button>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(event)">
                        <textarea id="user-input" rows="1" placeholder="Describe symptoms..." class="flex-1 bg-transparent border-none focus:ring-0 text-base py-5 text-white resize-none max-h-60"></textarea>
                        <button type="submit" class="p-5 bg-cyan-600 text-white rounded-3xl transition-all group"><i data-lucide="send" class="group-hover:translate-x-1 transition-transform"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "YOUR_API_KEY_HERE";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const MODEL_ID = "gemini-flash-latest"; // Updated Model Identifier [cite: 395]

        let messages = [{ role: 'assistant', text: "### Clinical Session Established\nWelcome to MedBot Pro. I am your secure clinical intelligence assistant." }];
        let attachedImageBase64 = null;

        window.startApp = () => {
            document.getElementById('landing-view').classList.add('hidden-view');
            document.getElementById('app-view').classList.remove('hidden-view');
            render();
            lucide.createIcons();
        };

        window.previewImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                attachedImageBase64 = reader.result;
                document.getElementById('image-preview').src = reader.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        const render = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-6 ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-gray-300'} rounded-[2rem]">
                        <div class="prose">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function callGemini(prompt, base64) {
            const model = genAI.getGenerativeModel({ 
                model: MODEL_ID,
                systemInstruction: "Role: Clinical Intelligence Assistant. Format: Professional Markdown. Use medical terminology. Include clinical disclaimer."
            });

            const history = document.getElementById('medical-history').value;
            const fullPrompt = history ? `[PATIENT CONTEXT]: ${history}\n[QUERY]: ${prompt}` : prompt;

            const parts = [{ text: fullPrompt }];
            if (base64) {
                parts.push({ inlineData: { mimeType: "image/png", data: base64.split(',')[1] } });
            }

            const result = await model.generateContent({ contents: [{ role: 'user', parts }] });
            return result.response.text();
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const status = document.getElementById('status-text');
            const text = input.value.trim();
            if (!text && !attachedImageBase64) return;

            messages.push({ role: 'user', text: text || "[Imagery Provided]" });
            const currentImg = attachedImageBase64;
            input.value = '';
            attachedImageBase64 = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            render();

            status.innerText = "Synthesizing Input...";
            try {
                const res = await callGemini(text || "Analyze imagery.", currentImg);
                messages.push({ role: 'assistant', text: res });
            } catch (err) {
                messages.push({ role: 'assistant', text: "**Error**: Clinical nodes unreachable." });
            } finally {
                status.innerText = "Protocol Active";
                render();
            }
        };
        lucide.createIcons();
    </script>
</body>
</html>
