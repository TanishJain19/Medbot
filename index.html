<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthiva | Advanced Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e5e7eb; margin: 0; scroll-behavior: smooth; }
        .glow { position: absolute; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(100px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(135deg, #fff 30%, #64748b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-view { display: none !important; }
        .prose h3 { font-size: 1rem; font-weight: 700; color: var(--brand-cyan); margin-top: 1rem; margin-bottom: 0.5rem; text-transform: uppercase; }
        .chat-bubble-assistant { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 24px 24px 4px 24px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="glow top-[-10%] right-[-5%]"></div>
        <nav class="flex items-center justify-between px-8 py-8 sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-lg border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/20">
                    <i data-lucide="heart-pulse" class="w-6 h-6 text-cyan-400"></i>
                </div>
                <span class="text-2xl font-bold tracking-tighter italic text-white">Healthiva<span class="text-cyan-500">.</span></span>
            </div>
            <button onclick="startApp()" class="px-6 py-2.5 bg-white text-black text-sm font-bold rounded-full hover:scale-105 transition-all">Launch App</button>
        </nav>

        <section class="max-w-7xl mx-auto px-6 pt-32 pb-40 text-center">
            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-8 text-gradient leading-tight">Expert health advice,<br>delivered instantly.</h1>
            <p class="text-lg md:text-2xl text-slate-400 max-w-3xl mx-auto mb-12 font-light">Simple explanations, precautions, and remedies powered by Gemini AI.</p>
            <button onclick="startApp()" class="px-12 py-5 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-2xl transition-all shadow-2xl flex items-center gap-3 mx-auto">
                Start Consultation <i data-lucide="chevron-right"></i>
            </button>
        </section>
    </div>

    <div id="app-view" class="hidden-view flex h-screen bg-[#050505] overflow-hidden">
        <aside class="w-80 bg-[#0a0a0a] border-r border-white/5 flex flex-col z-30">
            <div class="p-6 flex-1 overflow-y-auto space-y-8">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <i data-lucide="heart-pulse" class="text-cyan-400 w-6 h-6"></i>
                    <h1 class="text-xl font-bold text-white italic">Healthiva</h1>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-cyan-500/60 block">Medical History</label>
                    <textarea id="medical-history" placeholder="Allergies, chronic conditions..." class="w-full h-48 bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white resize-none focus:outline-none focus:border-cyan-500/50 transition-all"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-white/5 text-center">
                <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-red-400 uppercase font-bold tracking-widest transition-colors">End Session</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-16 border-b border-white/5 flex items-center px-8 justify-between">
                <div class="flex items-center gap-3">
                    <span id="status-dot" class="status-dot bg-green-500"></span>
                    <span id="status-text" class="text-[10px] font-medium text-gray-500 uppercase tracking-widest">System Ready</span>
                </div>
                <span class="text-[9px] text-cyan-500/40 uppercase font-mono tracking-widest">Secure Link Active</span>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-10"></div>

            <div class="p-6 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <form id="chat-form" class="glass rounded-[2rem] p-2 flex items-center gap-2 border border-white/10 shadow-2xl">
                        <input type="text" id="user-input" placeholder="Describe how you're feeling..." class="flex-1 bg-transparent border-none text-sm p-4 text-white focus:ring-0">
                        <button type="submit" class="p-4 bg-cyan-600 text-white rounded-2xl hover:bg-cyan-500 transition-all shadow-lg"><i data-lucide="send"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

<script type="module">
    // Using your last provided key
    const API_KEY = "AIzaSyDEH3UZ1Jnccc1xLrxJHTVYnGp2rAaQVJQ";
    
    let messages = [{ 
        role: 'assistant', 
        text: 'Hello! I am **Healthiva**. Describe your symptoms, and I will provide a clear breakdown, followed by **Precautions** and **Remedies**.' 
    }];

    window.startApp = () => {
        document.getElementById('landing-view').classList.add('hidden-view');
        document.getElementById('app-view').classList.remove('hidden-view');
        render();
        lucide.createIcons();
    };

    const render = () => {
        const container = document.getElementById('chat-container');
        container.innerHTML = messages.map(m => `
            <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                <div class="max-w-[85%] p-5 rounded-3xl ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-gray-300 shadow-xl'}">
                    <div class="prose">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    };

    async function callGemini(prompt) {
        const history = document.getElementById('medical-history').value;
        
        // This is the "Universal Payload" format
        const payload = {
            contents: [{
                parts: [{ text: `System: You are Healthiva. Format: Explanation, ### Precautions, ### Remedies. Context: ${history}. User: ${prompt}` }]
            }],
            generationConfig: {
                temperature: 0.7,
                topK: 40,
                topP: 0.95,
                maxOutputTokens: 1024,
            }
        };

        // Try these in order. If one fails with 404, it immediately tries the next.
        const modelVariants = [
            "gemini-1.5-flash",
            "gemini-1.5-flash-latest",
            "gemini-pro"
        ];

        for (const model of modelVariants) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.candidates) {
                    return data.candidates[0].content.parts[0].text;
                }
                
                // If it's a 404 (Model Not Found), we try the next model in our list
                if (response.status === 404) {
                    console.warn(`Model ${model} not found, trying next...`);
                    continue; 
                }

                // If it's a 403 or 400, it's a key/service issue, not a model issue
                throw new Error(data.error?.message || "API Configuration Error");

            } catch (err) {
                if (err.message.includes("404")) continue;
                throw err;
            }
        }
        throw new Error("No compatible models found for this API key. Ensure 'Generative Language API' is enabled in Google AI Studio.");
    }

    document.getElementById('chat-form').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;

        messages.push({ role: 'user', text: val });
        input.value = ''; 
        render();

        document.getElementById('status-text').innerText = "Analyzing...";

        try {
            const reply = await callGemini(val);
            messages.push({ role: 'assistant', text: reply });
        } catch (err) {
            messages.push({ role: 'assistant', text: `⚠️ **Update Required:** ${err.message}` });
        }

        document.getElementById('status-text').innerText = "Ready";
        render();
    };

    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
</script>
