<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthiva | Diagnosis Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e5e7eb; margin: 0; }
        .glass { background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-bubble-assistant { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px 20px 20px 4px; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 20px 20px 4px 20px; }
        .hidden-view { display: none !important; }
    </style>
</head>
<body>

    <div id="app-view" class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-[#0a0a0a] border-r border-white/5 p-6 flex flex-col">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-8">
                    <i data-lucide="heart-pulse" class="text-cyan-400"></i>
                    <span class="font-bold italic">Healthiva</span>
                </div>
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Clinical History</label>
                <textarea id="medical-history" class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-white resize-none focus:outline-none focus:border-cyan-500"></textarea>
            </div>
            <div class="text-[10px] text-gray-600">Status: <span id="api-status" class="text-yellow-500">Ready</span></div>
        </aside>

        <main class="flex-1 flex flex-col">
            <div id="chat-container" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
            
            <div class="p-6">
                <form id="chat-form" class="max-w-3xl mx-auto glass rounded-2xl p-2 flex gap-2">
                    <input type="text" id="user-input" placeholder="Type here..." class="flex-1 bg-transparent border-none focus:ring-0 text-sm p-3 text-white">
                    <button type="submit" class="bg-cyan-600 px-6 py-2 rounded-xl text-white font-bold">Send</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        // INSERT THE KEY YOU GOT FROM AI STUDIO HERE
        const API_KEY = "AIzaSyCOhAG53eovpaNBiivQZZLl0eMyHZ_PeUw"; 

        let messages = [{ role: 'assistant', text: "I'm ready. If you get a 'Service Error', look at the message I post—it will contain the specific reason from Google." }];

        const render = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] p-4 ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant'}">
                        <div class="text-sm prose">${marked.parse(m.text)}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;

            messages.push({ role: 'user', text: val });
            input.value = '';
            render();

            document.getElementById('api-status').innerText = "Connecting...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await response.json();

                if (data.error) {
                    // This catches the specific reason from Google (e.g., API_KEY_INVALID)
                    messages.push({ role: 'assistant', text: `❌ **Google API Error:** ${data.error.message} (Reason: ${data.error.status})` });
                } else {
                    messages.push({ role: 'assistant', text: data.candidates[0].content.parts[0].text });
                    document.getElementById('api-status').innerText = "Connected";
                }
            } catch (err) {
                messages.push({ role: 'assistant', text: "❌ **Network Error:** Could not reach Google servers." });
            }
            render();
        };

        render();
        lucide.createIcons();
    </script>
</body>
</html>
