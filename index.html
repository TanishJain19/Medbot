<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot Pro | Advanced Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow: hidden; margin: 0; }
        .glow { position: absolute; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-view { display: none !important; }
        .scanning-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent); animation: scan 3s infinite; z-index: 20; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; padding: 1.5rem; border-left: 3px solid var(--brand-cyan); }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 24px 24px 4px 24px; padding: 1.5rem; box-shadow: 0 10px 20px -5px rgba(8, 145, 178, 0.3); }
        .prose h3 { color: var(--brand-cyan); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-top: 1rem; letter-spacing: 0.1em; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="home-view" class="h-screen w-full relative flex flex-col items-center justify-center px-6 overflow-hidden">
        <div class="glow top-[-10%] left-[-10%]"></div>
        <div class="text-center animate-in fade-in zoom-in duration-1000">
            <div class="w-16 h-16 bg-cyan-500/10 rounded-2xl flex items-center justify-center border border-cyan-500/20 mx-auto mb-10">
                <i data-lucide="activity" class="w-8 h-8 text-cyan-400"></i>
            </div>
            <h1 class="text-6xl md:text-9xl font-black tracking-tighter text-gradient leading-none mb-6">MedBot<span class="text-cyan-500">.</span>Pro</h1>
            <p class="text-slate-400 text-lg md:text-xl font-light max-w-2xl mx-auto mb-12">Professional Clinical Synthesis & Diagnostic Imagery Interpretation.</p>
            
            <button id="launch-btn" class="px-12 py-5 bg-white text-slate-950 rounded-full font-bold text-xs uppercase tracking-[0.3em] hover:bg-cyan-400 hover:scale-105 transition-all flex items-center gap-4 mx-auto cursor-pointer">
                Launch Intelligence Uplink
                <i data-lucide="zap" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <div id="app-view" class="hidden-view flex h-screen w-full overflow-hidden">
        <aside class="w-80 bg-[#070b14]/90 backdrop-blur-xl border-r border-white/5 flex flex-col">
            <div class="p-8 flex-1 overflow-y-auto space-y-10">
                <div class="flex items-center gap-3">
                    <i data-lucide="stethoscope" class="w-6 h-6 text-cyan-400"></i>
                    <span class="text-lg font-black italic text-white">MEDBOT PRO</span>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-cyan-500/60 mb-4 block">Patient Baseline</label>
                    <textarea id="medical-history" placeholder="Allergies, chronic conditions..." class="w-full h-48 bg-white/5 border border-white/10 rounded-2xl p-5 text-xs text-white resize-none focus:outline-none focus:border-cyan-500/50 transition-all"></textarea>
                </div>

                <div class="pt-10 border-t border-white/5 space-y-4">
                    <button onclick="downloadTranscript()" class="w-full flex items-center justify-between p-4 glass rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:border-cyan-500/40 transition-all">
                        Export Report <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="p-6 border-t border-white/5">
                <button onclick="location.reload()" class="w-full py-4 text-[10px] text-gray-500 hover:text-red-400 uppercase font-bold tracking-widest transition-colors">Terminate Session</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#020617]">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_8px_#06b6d4]"></div>
                    <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Protocol Active</span>
                </div>
                <span class="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded text-[8px] text-cyan-400 font-bold uppercase">v1.5 Flash</span>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-12 space-y-12"></div>

            <div class="p-10">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden absolute bottom-full mb-8">
                        <div class="relative w-48 h-48 overflow-hidden rounded-[2.5rem] border-2 border-cyan-500 shadow-2xl">
                            <div class="scanning-line"></div>
                            <img id="image-preview" src="" class="w-full h-full object-cover">
                            <button onclick="clearImage()" class="absolute top-3 right-3 p-1.5 bg-black/60 rounded-full text-white hover:bg-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <form id="chat-form" class="glass rounded-[2.5rem] p-4 flex items-end gap-3 shadow-2xl border-white/10">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="p-5 text-slate-500 hover:text-cyan-400 transition-colors"><i data-lucide="camera"></i></button>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(event)">
                        <textarea id="user-input" rows="1" placeholder="Type symptoms or clinical findings..." class="flex-1 bg-transparent border-none focus:ring-0 text-base py-5 text-white resize-none max-h-60"></textarea>
                        <button type="submit" class="p-5 bg-cyan-600 text-white rounded-[1.8rem] hover:bg-cyan-500 transition-all"><i data-lucide="send"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyB1rBY1hZBUyRRFyUt5hX0fdAEW_DkwDT0"; // <--- PASTE KEY HERE LOCALLY
        const genAI = new GoogleGenerativeAI(API_KEY);
        let messages = [];
        let attachedImageBase64 = null;

        // NAVIGATION
        document.getElementById('launch-btn').addEventListener('click', () => {
            document.getElementById('home-view').classList.add('hidden-view');
            const app = document.getElementById('app-view');
            app.classList.remove('hidden-view');
            app.style.display = 'flex';
            lucide.createIcons();
            messages.push({ role: 'assistant', text: "### Session Initialized\nUplink secure. How can I assist your clinical analysis today?" });
            renderMessages();
        });

        // IMAGE HANDLING
        window.handleImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                attachedImageBase64 = reader.result;
                document.getElementById('image-preview').src = reader.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.clearImage = () => {
            attachedImageBase64 = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = '';
        };

        // TRANSCRIPT
        window.downloadTranscript = () => {
            const content = messages.map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `MedBot-Pro-Report.txt`;
            a.click();
        };

        const renderMessages = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2">
                    <div class="max-w-[85%] ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-slate-300'}">
                        <div class="prose max-w-none">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function callGemini(prompt, img) {
            const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-flash",
                systemInstruction: "You are MedBot Pro. Provide: Assessment, Precautions, and Remedies. Tone: Clinical. Include medical disclaimer."
            });
            const history = document.getElementById('medical-history').value;
            const context = history ? `[HISTORY]: ${history}\n\n[QUERY]: ${prompt}` : prompt;
            
            const parts = [{ text: context }];
            if (img) parts.push({ inlineData: { mimeType: "image/png", data: img.split(',')[1] } });

            const result = await model.generateContent({ contents: [{ role: 'user', parts }] });
            return result.response.text();
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !attachedImageBase64) return;

            messages.push({ role: 'user', text: text || "[Imagery Provided]" });
            const currentImg = attachedImageBase64;
            input.value = '';
            clearImage();
            renderMessages();

            document.getElementById('status-text').innerText = "Synthesizing...";
            document.getElementById('status-dot').classList.add('animate-pulse');

            try {
                const res = await callGemini(text || "Interpret imagery.", currentImg);
                messages.push({ role: 'assistant', text: res });
            } catch (err) {
                messages.push({ role: 'assistant', text: "⚠️ **Link Error**: Check API Key Locally." });
            } finally {
                document.getElementById('status-text').innerText = "Protocol Active";
                document.getElementById('status-dot').classList.remove('animate-pulse');
                renderMessages();
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
