<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot Pro | Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; margin: 0; overflow-x: hidden; }
        
        .glow { position: absolute; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-view { display: none !important; }
        
        /* Sidebar transition for mobile */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        @media (max-width: 1024px) {
            #sidebar { position: fixed; transform: translateX(-100%); height: 100%; width: 280px; }
            #sidebar.open { transform: translateX(0); }
            .hero-text { font-size: 4rem !important; line-height: 1; }
        }

        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px 20px 20px 4px; padding: 1.25rem; border-left: 3px solid var(--brand-cyan); }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 20px 20px 4px 20px; padding: 1.25rem; }
        .scanning-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent); animation: scan 3s infinite; z-index: 20; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="home-view" class="fixed inset-0 w-full h-full flex flex-col items-center justify-center px-6 text-center z-[100] bg-[#020617]">
        <div class="glow"></div>
        <div class="animate-in fade-in zoom-in duration-700">
            <h1 class="hero-text text-7xl md:text-9xl font-black tracking-tighter text-gradient mb-6">MedBot<span class="text-cyan-500">.</span>Pro</h1>
            <p class="text-slate-400 text-base md:text-xl font-light max-w-xl mx-auto mb-10">Advanced Clinical Intelligence. Analysis at the speed of thought.</p>
            <button id="launch-btn" class="px-10 py-5 bg-white text-slate-950 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-cyan-400 transition-all flex items-center gap-3 mx-auto shadow-2xl">
                Launch App <i data-lucide="zap" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <div id="app-view" class="hidden-view flex h-screen w-full overflow-hidden relative">
        
        <aside id="sidebar" class="w-80 bg-[#070b14] border-r border-white/5 flex flex-col shrink-0">
            <div class="p-6 flex-1 overflow-y-auto space-y-8 custom-scroll">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="activity" class="text-cyan-400 w-5 h-5"></i>
                        <span class="font-black italic text-sm tracking-widest">MEDBOT PRO</span>
                    </div>
                    <button onclick="toggleMenu()" class="lg:hidden p-2 text-slate-400"><i data-lucide="x"></i></button>
                </div>
                
                <div class="space-y-4">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-cyan-500/60 block ml-1">Clinical Context</label>
                    <textarea id="medical-history" placeholder="Allergies, conditions..." class="w-full h-40 bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white focus:outline-none focus:border-cyan-500/50 resize-none"></textarea>
                </div>

                <button onclick="downloadTranscript()" class="w-full flex items-center justify-between p-4 glass rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-400">
                    Export Report <i data-lucide="download" class="w-4 h-4 text-cyan-500"></i>
                </button>
            </div>
            <div class="p-6 border-t border-white/5">
                <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-red-400 uppercase font-bold tracking-widest">Disconnect</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#020617] min-w-0">
            <header class="h-16 md:h-20 border-b border-white/5 flex items-center justify-between px-4 md:px-8 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-40">
                <div class="flex items-center gap-3">
                    <button onclick="toggleMenu()" class="lg:hidden p-2 text-white bg-white/5 rounded-lg"><i data-lucide="menu"></i></button>
                    <div class="flex items-center gap-2">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-cyan-500"></div>
                        <span id="status-text" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest hidden sm:inline">Active Protocol</span>
                    </div>
                </div>
                <div class="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded text-[8px] text-cyan-400 font-bold">GEMINI FLASH</div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 custom-scroll"></div>

            <div class="p-4 md:p-8 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden absolute bottom-full mb-4 left-0">
                        <div class="relative w-32 h-32 md:w-44 md:h-44 rounded-2xl overflow-hidden border-2 border-cyan-500 shadow-2xl">
                            <div class="scanning-line"></div>
                            <img id="image-preview" src="" class="w-full h-full object-cover">
                            <button onclick="clearImage()" class="absolute top-2 right-2 p-1 bg-black/60 rounded-full text-white"><i data-lucide="x" class="w-3 h-3"></i></button>
                        </div>
                    </div>

                    <form id="chat-form" class="glass rounded-[1.5rem] md:rounded-[2.5rem] p-2 md:p-3 flex items-center gap-2 shadow-2xl">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="p-3 md:p-4 text-slate-500 hover:text-cyan-400"><i data-lucide="camera" class="w-5 h-5 md:w-6 md:h-6"></i></button>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(event)">
                        
                        <input type="text" id="user-input" placeholder="Type symptoms..." class="flex-1 bg-transparent border-none focus:ring-0 text-sm md:text-base py-3 text-white">
                        
                        <button type="submit" class="p-3 md:p-5 bg-cyan-600 text-white rounded-xl md:rounded-[1.5rem] hover:bg-cyan-500 transition-all shadow-lg shadow-cyan-900/20"><i data-lucide="send" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // CONFIG: Replace with your key locally
        const API_KEY = "AIzaSyB1rBY1hZBUyRRFyUt5hX0fdAEW_DkwDT0"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        let messages = [];
        let attachedImageBase64 = null;

        // UI NAVIGATION
        window.launchApp = () => {
            document.getElementById('home-view').classList.add('hidden-view');
            document.getElementById('app-view').classList.remove('hidden-view');
            messages.push({ role: 'assistant', text: "### Secure Uplink Established\nUplink stable. Describe symptoms or upload imagery for clinical analysis." });
            renderMessages();
            lucide.createIcons();
        };

        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        window.handleImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                attachedImageBase64 = reader.result;
                document.getElementById('image-preview').src = reader.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.clearImage = () => {
            attachedImageBase64 = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = '';
        };

        const renderMessages = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300">
                    <div class="max-w-[90%] md:max-w-[80%] ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-slate-300'}">
                        <div class="prose prose-invert text-xs md:text-sm leading-relaxed">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function callGemini(prompt, img) {
            const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-flash",
                systemInstruction: "You are MedBot Pro. Structure: Assessment, Precautions, Remedies. Direct clinical tone."
            });
            const history = document.getElementById('medical-history').value;
            const context = history ? `[PATIENT HISTORY]: ${history}\n\n[USER]: ${prompt}` : prompt;
            
            const parts = [{ text: context }];
            if (img) parts.push({ inlineData: { mimeType: "image/png", data: img.split(',')[1] } });

            const result = await model.generateContent({ contents: [{ role: 'user', parts }] });
            return result.response.text();
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !attachedImageBase64) return;

            messages.push({ role: 'user', text: text || "[Imagery Provided]" });
            const currentImg = attachedImageBase64;
            input.value = '';
            clearImage();
            renderMessages();

            document.getElementById('status-text').innerText = "Synthesizing...";
            document.getElementById('status-dot').classList.add('animate-pulse');

            try {
                const res = await callGemini(text || "Analyze imagery.", currentImg);
                messages.push({ role: 'assistant', text: res });
            } catch (err) {
                messages.push({ role: 'assistant', text: "⚠️ **Link Error**: Check API Key locally." });
            } finally {
                document.getElementById('status-text').innerText = "Active Protocol";
                document.getElementById('status-dot').classList.remove('animate-pulse');
                renderMessages();
            }
        };

        window.downloadTranscript = () => {
            const content = messages.map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `MedBot-Report.txt`;
            a.click();
        };

        document.getElementById('launch-btn').onclick = window.launchApp;
        lucide.createIcons();
    </script>
</body>
</html>
