<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot Pro | Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow: hidden; margin: 0; }
        .glow { position: absolute; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.07) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden-view { display: none !important; visibility: hidden; }
        .text-gradient { background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; padding: 1.5rem; border-left: 3px solid var(--brand-cyan); }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 24px 24px 4px 24px; padding: 1.5rem; }
        .prose h3 { color: var(--brand-cyan); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-top: 1rem; }
    </style>
</head>
<body>

    <div id="home-view" class="h-screen w-full relative flex flex-col items-center justify-center px-6 text-center">
        <div class="glow top-[-10%] left-[-10%]"></div>
        <div class="text-center">
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter text-gradient mb-6">MedBot<span class="text-cyan-500">.</span>Pro</h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-12">Clinical Intelligence and Imagery Synthesis.</p>
            
            <button id="launch-btn" class="px-12 py-5 bg-white text-slate-950 rounded-full font-bold text-xs uppercase tracking-[0.3em] hover:bg-cyan-400 transition-all flex items-center gap-4 mx-auto cursor-pointer">
                Launch Intelligence Uplink
                <i data-lucide="zap" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <div id="app-view" class="hidden-view flex h-screen w-full overflow-hidden">
        <aside class="w-80 bg-[#070b14] border-r border-white/5 flex flex-col p-8 space-y-10">
            <h2 class="text-xl font-black italic">MedBot Pro</h2>
            <textarea id="medical-history" placeholder="Patient history..." class="w-full h-48 bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white resize-none"></textarea>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-red-400 uppercase font-bold tracking-widest">Disconnect</button>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="h-20 border-b border-white/5 flex items-center px-10">
                <div class="w-2 h-2 rounded-full bg-cyan-500 mr-3 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Protocol Active</span>
            </header>
            <div id="chat-container" class="flex-1 overflow-y-auto p-12 space-y-10"></div>
            <div class="p-10">
                <form id="chat-form" class="glass rounded-[2.5rem] p-4 flex items-center gap-3 max-w-4xl mx-auto">
                    <input type="text" id="user-input" placeholder="Describe symptoms..." class="flex-1 bg-transparent border-none p-4 text-white focus:ring-0">
                    <button type="submit" class="p-5 bg-cyan-600 text-white rounded-full"><i data-lucide="send"></i></button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // CONFIG: Replace with your key locally
        const API_KEY = "PASTE_YOUR_NEW_KEY_HERE"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        // --- NAVIGATION LOGIC ---
        const homeView = document.getElementById('home-view');
        const appView = document.getElementById('app-view');
        const launchBtn = document.getElementById('launch-btn');

        launchBtn.addEventListener('click', () => {
            homeView.style.display = 'none';
            appView.classList.remove('hidden-view');
            appView.style.display = 'flex'; // Explicitly set to flex
            lucide.createIcons();
            
            // Add initial message
            messages.push({ role: 'assistant', text: "### Secure Uplink Established\nReady for analysis." });
            render();
        });

        // --- CHAT LOGIC ---
        let messages = [];

        const render = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-slate-300'}">
                        <div class="prose">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            messages.push({ role: 'user', text: val });
            input.value = '';
            render();

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(val);
                const response = await result.response;
                messages.push({ role: 'assistant', text: response.text() });
            } catch (err) {
                messages.push({ role: 'assistant', text: "⚠️ **Error**: Check your API Key." });
            }
            render();
        };

        lucide.createIcons();
    </script>
</body>
</html>
