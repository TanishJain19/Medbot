<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthiva | Advanced Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e5e7eb; overflow-x: hidden; margin: 0; padding: 0; scroll-behavior: smooth; }
        .glow { position: absolute; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(100px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(135deg, #fff 30%, #64748b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-view { display: none !important; }
        .prose { font-size: 0.875rem; line-height: 1.6; }
        .prose strong { color: #fff; font-weight: 600; }
        .prose ul { list-style-type: disc; padding-left: 1.25rem; margin: 0.5rem 0; }
        .prose h3 { font-size: 1rem; font-weight: 700; color: var(--brand-cyan); margin-top: 1rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        .chat-bubble-assistant { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .chat-bubble-user { background: #0891b2; color: white; }
        .feature-card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); transition: all 0.4s ease; }
        .feature-card:hover { background: rgba(255,255,255,0.03); border-color: rgba(6, 182, 212, 0.2); }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="glow top-[-20%] right-[-10%]"></div>
        <nav class="flex items-center justify-between px-6 md:px-12 py-8 sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-lg border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/20">
                    <i data-lucide="heart-pulse" class="w-6 h-6 text-cyan-400"></i>
                </div>
                <span class="text-2xl font-bold tracking-tighter italic text-white">Healthiva<span class="text-cyan-500">.</span></span>
            </div>
            <button onclick="startApp()" class="px-6 py-2.5 bg-white text-black text-sm font-bold rounded-full hover:scale-105 transition-all">Launch App</button>
        </nav>

        <section class="max-w-7xl mx-auto px-6 pt-24 pb-32 text-center">
            <h1 class="text-6xl md:text-9xl font-extrabold tracking-tighter mb-8 text-gradient leading-[0.9]">Health advice <br> made simple.</h1>
            <p class="text-lg md:text-2xl text-slate-400 max-w-3xl mx-auto mb-12 font-light">Intelligent medical insights without the jargon.</p>
            <button onclick="startApp()" class="px-12 py-5 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 mx-auto">
                Start Consultation <i data-lucide="arrow-right"></i>
            </button>
        </section>
    </div>

    <div id="app-view" class="hidden-view flex h-screen bg-[#050505] overflow-hidden">
        <aside id="sidebar" class="w-80 bg-[#0a0a0a] border-r border-white/5 flex flex-col z-30">
            <div class="p-6 flex-1 overflow-y-auto space-y-8">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <i data-lucide="heart-pulse" class="text-cyan-400 w-6 h-6"></i>
                    <h1 class="text-xl font-bold text-white italic">Healthiva</h1>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-cyan-500/60 mb-3 block">Clinical History</label>
                    <textarea id="medical-history" placeholder="Allergies, conditions..." class="w-full h-40 bg-white/5 border border-white/5 rounded-2xl p-4 text-xs focus:outline-none focus:border-cyan-500/50 text-white resize-none"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-white/5">
                <button onclick="resetSession()" class="w-full p-3.5 text-xs font-semibold text-gray-500 hover:text-red-400 bg-white/5 rounded-xl border border-transparent transition-all">Reset Consultation</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0">
            <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-[#050505]/80 backdrop-blur-xl">
                <span id="status-text" class="text-[10px] font-medium text-gray-500 uppercase tracking-widest">Consultation Active</span>
            </header>
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-10"></div>
            <div class="p-4 md:p-8">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden absolute bottom-full mb-4">
                        <img id="image-preview" src="" class="w-32 h-32 object-cover rounded-xl border-2 border-cyan-500">
                    </div>
                    <form id="chat-form" class="glass rounded-3xl p-3 flex items-end gap-2">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="p-4 text-gray-500 hover:text-cyan-400"><i data-lucide="camera"></i></button>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(event)">
                        <textarea id="user-input" rows="1" placeholder="Describe your symptoms..." class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-4 text-white resize-none"></textarea>
                        <button type="submit" class="p-4 bg-cyan-600 text-white rounded-2xl"><i data-lucide="send"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        
        // --- FIXED CONFIGURATION ---
        const apiKey = "AIzaSyCrmFQFq9eYQo-g16ZPKvYg89rAX1_fXqE";
        
        // Safety: Placeholder config to prevent ReferenceErrors
        const firebaseConfig = { apiKey: "internal", projectId: "healthiva-app" };
        
        try {
            initializeApp(firebaseConfig);
        } catch (e) {
            console.warn("Firebase initialized in offline mode.");
        }

        let messages = [{ role: 'assistant', text: 'Hello! I am Healthiva. Please describe how you feel or share a photo. I will provide simple advice and precautions.' }];
        let attachedImageBase64 = null;

        window.startApp = () => {
            document.getElementById('landing-view').classList.add('hidden-view');
            document.getElementById('app-view').classList.remove('hidden-view');
            renderMessages();
            lucide.createIcons();
        };

        window.renderMessages = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(msg => `
                <div class="flex gap-4 max-w-4xl mx-auto ${msg.role === 'user' ? 'flex-row-reverse' : ''}">
                    <div class="px-6 py-4 rounded-3xl text-sm ${msg.role === 'assistant' ? 'chat-bubble-assistant text-gray-300' : 'chat-bubble-user'}">
                        <div class="prose">${msg.role === 'assistant' ? marked.parse(msg.text) : msg.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        window.previewImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                attachedImageBase64 = ev.target.result;
                document.getElementById('image-preview').src = attachedImageBase64;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !attachedImageBase64) return;

            messages.push({ role: 'user', text: text || "[Image Shared]" });
            const currentImg = attachedImageBase64;
            input.value = ''; 
            attachedImageBase64 = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            renderMessages();

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: `System: You are Healthiva assistant. Be simple. User History: ${document.getElementById('medical-history').value}. Query: ${text}` },
                            ...(currentImg ? [{ inlineData: { mimeType: "image/jpeg", data: currentImg.split(',')[1] } }] : [])
                        ]}]
                    })
                });
                const data = await response.json();
                messages.push({ role: 'assistant', text: data.candidates[0].content.parts[0].text });
                renderMessages();
            } catch (err) {
                messages.push({ role: 'assistant', text: "Sorry, I'm having trouble connecting. Please check your API key." });
                renderMessages();
            }
        };

        window.resetSession = () => { location.reload(); };
        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
    </script>
</body>
</html>
