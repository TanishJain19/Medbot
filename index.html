<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot | Advanced Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .glow { position: absolute; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scanning-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent); animation: scan 3s infinite; z-index: 20; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; padding: 1.5rem; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 24px 24px 4px 24px; padding: 1.5rem; }
        .prose h3 { color: var(--brand-cyan); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-80 bg-[#070b14] border-r border-white/5 flex flex-col z-30">
            <div class="p-8 flex-1 overflow-y-auto space-y-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/20">
                        <i data-lucide="stethoscope" class="w-6 h-6 text-cyan-400"></i>
                    </div>
                    <span class="text-2xl font-black tracking-tighter italic text-white">MedBot<span class="text-cyan-500">.</span></span>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-[0.3em] text-cyan-500/60 mb-4 block">Clinical Baseline</label>
                    <textarea id="medical-history" placeholder="Allergies, chronic conditions, or medications..." class="w-full h-44 bg-white/5 border border-white/5 rounded-2xl p-5 text-xs text-white resize-none focus:outline-none focus:border-cyan-500/50 transition-all"></textarea>
                    <p class="text-[9px] text-slate-500 mt-2 italic">Context is shared with the MedBot engine.</p>
                </div>

                <div class="pt-10 border-t border-white/5">
                    <h4 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">Uplink Status</h4>
                    <div class="space-y-3">
                        <div class="glass p-3 rounded-xl flex items-center justify-between">
                            <span class="text-[10px] text-slate-400">Engine</span>
                            <span class="text-[10px] font-mono text-cyan-400 uppercase tracking-tighter">Flash-Latest</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/5 text-center">
                <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-red-400 uppercase font-bold tracking-widest transition-colors">Terminate Session</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#020617]">
            <div class="glow top-[-20%] right-[-10%]"></div>
            
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-[#020617]/80 backdrop-blur-2xl">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_8px_#06b6d4]"></div>
                    <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">MedBot Protocol Active</span>
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-12">
                <div id="welcome-message" class="max-w-3xl mx-auto text-center pt-20">
                    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 text-gradient">MedBot Clinical Intel.</h1>
                    <p class="text-slate-400 text-lg font-light mb-10">Instant analysis of symptoms and clinical imagery. Powered by high-speed neural processing.</p>
                </div>
            </div>

            <div class="p-8 md:p-12">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden absolute bottom-full mb-8 left-0">
                        <div class="relative w-48 h-48 overflow-hidden rounded-[2.5rem] border-2 border-cyan-500 shadow-2xl">
                            <div class="scanning-line"></div>
                            <img id="image-preview" src="" class="w-full h-full object-cover brightness-75">
                            <button onclick="clearImage()" class="absolute top-3 right-3 p-1.5 bg-black/60 rounded-full text-white hover:bg-red-500 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <form id="chat-form" class="glass rounded-[2.5rem] p-4 flex items-end gap-3 shadow-2xl border-white/10">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="p-5 text-slate-500 hover:text-cyan-400 transition-colors"><i data-lucide="camera"></i></button>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(event)">
                        
                        <textarea id="user-input" rows="1" placeholder="Describe symptoms or upload clinical imagery..." class="flex-1 bg-transparent border-none focus:ring-0 text-base py-5 text-white resize-none max-h-60"></textarea>
                        
                        <button type="submit" class="p-5 bg-cyan-600 text-white rounded-3xl transition-all shadow-lg hover:bg-cyan-500"><i data-lucide="send"></i></button>
                    </form>
                    <p class="text-[10px] text-center text-slate-500 mt-4 uppercase tracking-[0.2em]">Consult a professional for critical health matters.</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // IMPORTANT: Paste your new API key here locally
        const API_KEY = "AIzaSyAL-TfpNDXtCxUY3WGpHJmT3SxYRZUxcKw"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        const MODEL_NAME = "gemini-flash-latest";

        let messages = [];
        let attachedImageBase64 = null;

        window.handleImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                attachedImageBase64 = reader.result;
                document.getElementById('image-preview').src = reader.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.clearImage = () => {
            attachedImageBase64 = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = '';
        };

        const render = () => {
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-message');
            
            if (messages.length > 0) welcome.classList.add('hidden');

            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="max-w-[85%] ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-slate-300'}">
                        <div class="prose max-w-none">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function runInference(prompt, imageBase64) {
            const model = genAI.getGenerativeModel({ 
                model: MODEL_NAME,
                systemInstruction: "You are MedBot, an advanced clinical AI. Analyze the patient query and provided imagery. Provide: 1. Assessment, 2. ### Precautions, 3. ### Remedies. Include a professional medical disclaimer."
            });

            const history = document.getElementById('medical-history').value;
            const fullPrompt = history ? `[CLINICAL HISTORY]: ${history}\n\n[QUERY]: ${prompt}` : prompt;

            const parts = [{ text: fullPrompt }];
            if (imageBase64) {
                parts.push({ inlineData: { mimeType: "image/png", data: imageBase64.split(',')[1] } });
            }

            const result = await model.generateContent({ contents: [{ role: 'user', parts }] });
            return result.response.text();
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const status = document.getElementById('status-text');
            const dot = document.getElementById('status-dot');
            const text = input.value.trim();
            
            if (!text && !attachedImageBase64) return;

            messages.push({ role: 'user', text: text || "[Clinical Imagery Uploaded]" });
            const imgData = attachedImageBase64;
            input.value = '';
            clearImage();
            render();

            status.innerText = "Synthesizing Input...";
            dot.classList.add('animate-pulse');

            try {
                const res = await runInference(text || "Analyze clinical imagery.", imgData);
                messages.push({ role: 'assistant', text: res });
            } catch (err) {
                messages.push({ role: 'assistant', text: "⚠️ **System Error**: Security protocols or connection timeout. Verify API key locally." });
            } finally {
                status.innerText = "MedBot Protocol Active";
                dot.classList.remove('animate-pulse');
                render();
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
