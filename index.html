<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot Pro | Advanced Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; scroll-behavior: smooth; }
        .glow { position: absolute; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-view { display: none !important; }
        .prose h3 { font-size: 0.9rem; font-weight: 800; color: var(--brand-cyan); margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .scanning-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent); animation: scan 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; z-index: 20; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 24px 24px 4px 24px; box-shadow: 0 10px 15px -3px rgba(8, 145, 178, 0.3); }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="glow top-[-20%] right-[-10%]"></div>
        <nav class="flex items-center justify-between px-6 md:px-16 py-6 sticky top-0 z-50 bg-[#020617]/80 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/20">
                    <i data-lucide="stethoscope" class="w-6 h-6 text-cyan-400"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter italic text-white">MedBot<span class="text-cyan-500">.</span></span>
            </div>
            <button onclick="startApp()" class="px-7 py-3 bg-white text-slate-950 text-xs font-bold rounded-full hover:scale-105 transition-all">ACCESS PORTAL</button>
        </nav>

        <section class="max-w-7xl mx-auto px-6 pt-32 pb-24 text-center">
            <h1 class="text-6xl md:text-[8rem] font-extrabold tracking-tighter mb-10 text-gradient leading-[0.85] py-2">Clinical Intel.</h1>
            <p class="text-lg md:text-2xl text-slate-400 max-w-3xl mx-auto mb-16 leading-relaxed font-light italic">Secure health analysis via Gemini Flash engine.</p>
            <button onclick="startApp()" class="px-14 py-6 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 mx-auto text-lg">
                Start Session <i data-lucide="arrow-right"></i>
            </button>
        </section>
    </div>

    <div id="app-view" class="hidden-view flex h-screen bg-[#020617] overflow-hidden">
        <aside class="w-80 bg-[#070b14] border-r border-white/5 flex flex-col z-30">
            <div class="p-8 flex-1 overflow-y-auto space-y-10">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <i data-lucide="stethoscope" class="text-cyan-400 w-7 h-7"></i>
                    <h1 class="text-2xl font-black text-white italic tracking-tighter">MedBot</h1>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-[0.3em] text-cyan-500/60 mb-4 block">Medical Baseline</label>
                    <textarea id="medical-history" placeholder="Enter history or allergies..." class="w-full h-44 bg-white/5 border border-white/5 rounded-2xl p-5 text-xs text-white resize-none focus:outline-none focus:border-cyan-500/50 transition-all"></textarea>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-[#020617]/80 backdrop-blur-2xl">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_8px_#06b6d4]"></div>
                    <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Protocol Active</span>
                </div>
                <span class="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded text-[8px] text-cyan-400 font-bold uppercase tracking-widest">FLASH LATEST</span>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-12"></div>

            <div class="p-8 md:p-12">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden absolute bottom-full mb-8 left-0">
                        <div class="relative w-48 h-48 overflow-hidden rounded-[2.5rem] border-2 border-cyan-500 shadow-2xl">
                            <div class="scanning-line"></div>
                            <img id="image-preview" src="" class="w-full h-full object-cover brightness-75">
                            <button onclick="clearImage()" class="absolute top-3 right-3 p-1.5 bg-black/60 rounded-full text-white hover:bg-red-500/80 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <form id="chat-form" class="glass rounded-[2.5rem] p-4 flex items-end gap-3 shadow-2xl border-white/10">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="p-5 text-slate-500 hover:text-cyan-400 transition-colors"><i data-lucide="camera"></i></button>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(event)">
                        <textarea id="user-input" rows="1" placeholder="Describe clinical symptoms..." class="flex-1 bg-transparent border-none focus:ring-0 text-base py-5 text-white resize-none max-h-60"></textarea>
                        <button type="submit" class="p-5 bg-cyan-600 text-white rounded-[1.5rem] hover:bg-cyan-500 transition-all shadow-lg shadow-cyan-900/20"><i data-lucide="send"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // IMPORTANT: Replace this with your NEW private key
        const API_KEY = "REPLACE_THIS_WITH_YOUR_NEW_PRIVATE_KEY";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const MODEL_ID = "gemini-flash-latest";

        let messages = [{ role: 'assistant', text: "### Secure Session Initialized\nUplink confirmed. Please provide patient data or imagery for clinical interpretation." }];
        let attachedImageBase64 = null;

        window.startApp = () => {
            document.getElementById('landing-view').classList.add('hidden-view');
            document.getElementById('app-view').classList.remove('hidden-view');
            render();
            lucide.createIcons();
        };

        window.handleImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                attachedImageBase64 = reader.result;
                document.getElementById('image-preview').src = reader.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.clearImage = () => {
            attachedImageBase64 = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = '';
        };

        const render = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="max-w-[85%] p-7 ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-slate-300'}">
                        <div class="prose max-w-none">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function runInference(prompt, imageBase64) {
            const model = genAI.getGenerativeModel({ 
                model: MODEL_ID,
                systemInstruction: "Role: Medical Assistant. Format: Professional Markdown with bold sections. Context: Always prioritize history if provided. Mandatory: End with a clinical disclaimer."
            });

            const history = document.getElementById('medical-history').value;
            const fullPrompt = history ? `[PATIENT HISTORY]: ${history}\n\n[QUERY]: ${prompt}` : prompt;

            const parts = [{ text: fullPrompt }];
            if (imageBase64) {
                parts.push({ inlineData: { mimeType: "image/png", data: imageBase64.split(',')[1] } });
            }

            const result = await model.generateContent({ contents: [{ role: 'user', parts }] });
            return result.response.text();
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            const text = input.value.trim();
            if (!text && !attachedImageBase64) return;

            messages.push({ role: 'user', text: text || "[Clinical Imagery Uploaded]" });
            const imgToPass = attachedImageBase64;
            input.value = '';
            clearImage();
            render();

            statusText.innerText = "Synthesizing Input...";
            statusDot.classList.add('animate-pulse');

            try {
                const response = await runInference(text || "Interpret clinical imagery.", imgToPass);
                messages.push({ role: 'assistant', text: response });
            } catch (err) {
                messages.push({ role: 'assistant', text: "⚠️ **System Error**: Clinical node timeout or invalid key. Please check your setup." });
            } finally {
                statusText.innerText = "Protocol Active";
                statusDot.classList.remove('animate-pulse');
                render();
            }
        };

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
