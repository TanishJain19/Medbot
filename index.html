<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthiva | Consultation Active</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e5e7eb; margin: 0; }
        .glass { background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-bubble-assistant { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px 20px 20px 4px; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 20px 20px 4px 20px; }
        .prose h3 { color: var(--brand-cyan); font-weight: bold; margin-top: 12px; margin-bottom: 4px; }
        .loading-dots::after { content: '...'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="w-72 bg-[#0a0a0a] border-r border-white/5 p-6 flex flex-col transition-all">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-8">
                    <i data-lucide="heart-pulse" class="text-cyan-400"></i>
                    <span class="font-bold italic text-xl">Healthiva</span>
                </div>
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Clinical History</label>
                <textarea id="medical-history" placeholder="Example: Nut allergy, High BP..." class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-white resize-none focus:outline-none focus:border-cyan-500"></textarea>
            </div>
            <div id="status-box" class="text-[10px] text-gray-600 uppercase font-bold">System: <span id="status-text" class="text-green-500">Connected</span></div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <div id="chat-container" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
            
            <div class="p-6">
                <div class="max-w-3xl mx-auto relative">
                    <form id="chat-form" class="glass rounded-2xl p-2 flex gap-2 border border-white/10">
                        <input type="text" id="user-input" placeholder="How can I help you today?" class="flex-1 bg-transparent border-none focus:ring-0 text-sm p-3 text-white">
                        <button type="submit" class="bg-cyan-600 px-6 py-2 rounded-xl text-white font-bold hover:bg-cyan-500 transition-all">Send</button>
                    </form>
                    <p class="text-[9px] text-gray-600 text-center mt-3 uppercase tracking-widest">Medical AI Assistant v1.5</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        const API_KEY = "AIzaSyDVs9Tw2vdaUK0dGhRKSSMM8-98QnDdv44"; 
        let messages = [{ role: 'assistant', text: "Hello! I am Healthiva. Please describe your symptoms or ask a health-related question. I will provide a simple breakdown, precautions, and remedies." }];

        const render = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-4 ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant'}">
                        <div class="text-sm prose text-gray-200">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function fetchAI(prompt) {
            const history = document.getElementById('medical-history').value;
            // Combining instructions with user prompt for cleaner delivery
            const systemContext = `You are Healthiva, a concise medical assistant. 
            Format: 1. Simple Explanation. 2. ### Precautions. 3. ### Remedies. 
            Patient History: ${history || 'None provided'}.
            Query: ${prompt}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemContext }] }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const status = document.getElementById('status-text');
            const val = input.value.trim();
            if(!val) return;

            messages.push({ role: 'user', text: val });
            input.value = '';
            render();

            status.innerText = "Analyzing";
            status.className = "text-cyan-500 loading-dots";

            try {
                const aiReply = await fetchAI(val);
                messages.push({ role: 'assistant', text: aiReply });
            } catch (err) {
                messages.push({ role: 'assistant', text: `⚠️ **API Error:** ${err.message}` });
            }

            status.innerText = "Connected";
            status.className = "text-green-500";
            render();
        };

        render();
        lucide.createIcons();
    </script>
</body>
</html>
