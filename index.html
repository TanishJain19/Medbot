<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot | Your Personal Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; margin: 0; }
        .glow { position: absolute; width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, rgba(6, 182, 212, 0) 70%); border-radius: 50%; filter: blur(120px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden-view { display: none !important; }
        
        /* Formatted Response Styling */
        .prose h3 { color: #22d3ee; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; margin-top: 1.2rem; border-bottom: 1px solid rgba(34, 211, 238, 0.2); padding-bottom: 4px; }
        .prose ul { list-style-type: none; padding-left: 0; }
        .prose li { position: relative; padding-left: 1.5rem; margin-bottom: 0.4rem; font-size: 0.85rem; color: #cbd5e1; }
        .prose li::before { content: "→"; position: absolute; left: 0; color: #06b6d4; font-weight: bold; }
        .prose strong { color: #f8fafc; }
        .disclaimer-box { margin-top: 1.5rem; padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 10px; color: #f87171; }

        #sidebar { transition: transform 0.3s ease; z-index: 50; }
        @media (max-width: 1024px) {
            #sidebar { position: fixed; transform: translateX(-100%); height: 100%; width: 300px; }
            #sidebar.open { transform: translateX(0); }
        }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px 20px 20px 4px; padding: 1.25rem; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 20px 20px 4px 20px; padding: 1.25rem; font-size: 0.9rem; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="home-view" class="h-screen w-full flex flex-col items-center justify-center px-6 bg-[#020617] relative overflow-hidden text-center">
        <div class="glow top-[-20%] left-[-10%]"></div>
        <div class="max-w-5xl w-full flex flex-col items-center animate-in fade-in duration-1000">
            <h1 class="text-7xl md:text-[9rem] font-black tracking-tighter mb-4 text-white leading-none">MedBot<span class="text-cyan-500">.</span>Pro</h1>
            <p class="text-slate-400 text-sm md:text-lg mb-12">Private Assistant. Formatted Insights.</p>
            <button id="launch-btn" class="px-14 py-6 bg-white text-black rounded-full font-extrabold uppercase tracking-widest text-xs hover:scale-105 transition-all shadow-xl">
                Open Assistant
            </button>
        </div>
    </div>

    <div id="app-view" class="hidden-view flex h-screen w-full overflow-hidden relative">
        <aside id="sidebar" class="w-80 bg-[#070b14] border-r border-white/5 flex flex-col shrink-0">
            <div class="p-6 flex-1 overflow-y-auto space-y-6 custom-scroll">
                <span class="font-black italic text-sm tracking-widest text-cyan-400">MEDBOT</span>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold uppercase text-cyan-500/60 ml-1">My Medical Info</label>
                    <textarea id="medical-history" placeholder="Example: Allergic to aspirin..." class="w-full h-40 bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white focus:outline-none focus:border-cyan-500/50 resize-none"></textarea>
                    <button onclick="findHospital()" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-bold uppercase">Find a Hospital</button>
                </div>
                <div class="pt-6 border-t border-white/5">
                    <button onclick="location.reload()" class="w-full p-4 text-[10px] font-bold uppercase text-red-500/50">End Session</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#020617]">
            <header class="h-16 border-b border-white/5 flex items-center px-6">
                <button onclick="toggleMenu()" class="lg:hidden mr-4 text-white"><i data-lucide="menu"></i></button>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Assistant is Online</span>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 custom-scroll"></div>

            <div class="p-6 md:p-10">
                <div class="max-w-4xl mx-auto">
                    <form id="chat-form" class="glass rounded-[2.5rem] p-2 flex items-center gap-2 border-white/10">
                        <input type="text" id="user-input" placeholder="How are you feeling?" class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-3 text-white px-4 outline-none">
                        <button type="submit" class="p-4 bg-cyan-600 text-white rounded-full hover:bg-cyan-500 transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyBIRMUw-uw3KnJl25ARHqZMso3KUKUCum8"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        let messages = [];

        window.launchApp = () => {
            document.getElementById('home-view').classList.add('hidden-view');
            document.getElementById('app-view').classList.remove('hidden-view');
            document.getElementById('app-view').style.display = 'flex';
            messages.push({ role: 'assistant', text: "### Hello\nI am MedBot. How can I help you with your health today?" });
            renderMessages();
            lucide.createIcons();
        };

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('open');

        const renderMessages = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[90%] md:max-w-[80%] ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant'}">
                        <div class="prose prose-invert">${marked.parse(m.text)}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        async function callGemini(prompt) {
            const model = genAI.getGenerativeModel({ 
                model: "gemini-flash-latest",
                systemInstruction: `You are MedBot. 
                FORMATTING RULES:
                1. Use '### ASSESSMENT' for the main analysis.
                2. Use '### SUGGESTED STEPS' for bullet points of what to do.
                3. Use '### PRECAUTIONS' for things to watch out for.
                4. Wrap your medical disclaimer at the very end in a separate paragraph.
                Keep sentences short and professional.`
            });
            const hist = document.getElementById('medical-history').value;
            const result = await model.generateContent(`History: ${hist}\nUser: ${prompt}`);
            return result.response.text();
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            messages.push({ role: 'user', text: text });
            input.value = '';
            renderMessages();

            try {
                const res = await callGemini(text);
                messages.push({ role: 'assistant', text: res });
            } catch (err) {
                messages.push({ role: 'assistant', text: "### Error\nConnection failed. Please check your key." });
            }
            renderMessages();
        };

        document.getElementById('launch-btn').onclick = window.launchApp;
        lucide.createIcons();
    </script>
</body>
</html>
