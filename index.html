<script type="module">
    // Your provided key
    const API_KEY = "AIzaSyDgDRMHPd2Em3owqQ9jbZX5a8CQScSX8fI"; 

    async function fetchAI(prompt) {
        const history = document.getElementById('medical-history').value;
        const payload = {
            contents: [{ parts: [{ text: `System: Healthiva Medical Assistant. History: ${history}. Query: ${prompt}` }] }]
        };

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                // This will tell us the EXACT reason (e.g., PERMISSION_DENIED)
                throw new Error(`Google API Error (${response.status}): ${data.error ? data.error.message : 'Unknown'}`);
            }

            return data.candidates[0].content.parts[0].text;
        } catch (err) {
            throw err;
        }
    }

    document.getElementById('chat-form').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;

        messages.push({ role: 'user', text: val });
        input.value = '';
        renderMessages();

        try {
            const reply = await fetchAI(val);
            messages.push({ role: 'assistant', text: reply });
        } catch (err) {
            messages.push({ role: 'assistant', text: `⚠️ **Connection Issue:** ${err.message}` });
        }
        renderMessages();
    };
</script>
