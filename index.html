<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot Pro | Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand-cyan: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden-view { display: none !important; }
        .chat-bubble-assistant { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; padding: 1.5rem; }
        .chat-bubble-user { background: #0891b2; color: white; border-radius: 24px 24px 4px 24px; padding: 1.5rem; }
        .prose h3 { color: var(--brand-cyan); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-top: 1rem; }
    </style>
</head>
<body>

    <div id="app-view" class="flex h-screen bg-[#020617] overflow-hidden">
        <aside class="w-80 bg-[#070b14] border-r border-white/5 p-8 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <i data-lucide="stethoscope" class="text-cyan-400 w-7 h-7"></i>
                <h1 class="text-2xl font-black text-white italic tracking-tighter">MedBot</h1>
            </div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-cyan-500/60 mb-2">Medical History</label>
            <textarea id="medical-history" class="w-full h-44 bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white focus:outline-none focus:border-cyan-500"></textarea>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="h-16 border-b border-white/5 flex items-center justify-between px-8">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Protocol Active</span>
                </div>
                <span class="text-[9px] text-cyan-500 font-bold uppercase">Gemini Flash Latest</span>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-12 space-y-8"></div>

            <div class="p-8">
                <form id="chat-form" class="max-w-4xl mx-auto glass rounded-[2rem] p-2 flex items-center gap-2">
                    <input type="text" id="user-input" placeholder="Describe symptoms..." class="flex-1 bg-transparent border-none p-4 text-white focus:ring-0">
                    <button type="submit" class="p-4 bg-cyan-600 text-white rounded-2xl hover:bg-cyan-500 transition-all"><i data-lucide="send"></i></button>
                </form>
            </div>
        </main>
    </div>

    <script>
        // PASTE YOUR NEW KEY HERE LOCALLY
        const API_KEY = "AIzaSyAL-TfpNDXtCxUY3WGpHJmT3SxYRZUxcKw";
        const MODEL = "gemini-1.5-flash-latest";

        let messages = [{ role: 'assistant', text: "### Secure Session Initialized\nHow can I assist your clinical analysis today?" }];

        async function callGemini(prompt) {
            const history = document.getElementById('medical-history').value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Context: ${history}\n\nQuery: ${prompt}` }] }],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 1000 }
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message);
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        const render = () => {
            const container = document.getElementById('chat-container');
            container.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant text-slate-200'}">
                        <div class="prose">${m.role === 'assistant' ? marked.parse(m.text) : m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            messages.push({ role: 'user', text: val });
            input.value = '';
            render();

            document.getElementById('status-text').innerText = "Analyzing...";
            try {
                const res = await callGemini(val);
                messages.push({ role: 'assistant', text: res });
            } catch (err) {
                messages.push({ role: 'assistant', text: `⚠️ **Error**: ${err.message}` });
            } finally {
                document.getElementById('status-text').innerText = "Protocol Active";
                render();
            }
        };

        render();
        lucide.createIcons();
    </script>
</body>
</html>
